<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="50%" stop-color="#BF00FF"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#12101F"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#BF00FF"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: N in rounded square -->
  <rect x="10" y="15" width="90" height="90" rx="22" fill="url(#iconGrad)" opacity="0.15"/>
  <rect x="10" y="15" width="90" height="90" rx="22" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>

  <!-- Neural network nodes inside icon -->
  <circle cx="35" cy="45" r="3" fill="#00F5FF" opacity="0.6"/>
  <circle cx="55" cy="35" r="2.5" fill="#BF00FF" opacity="0.6"/>
  <circle cx="75" cy="50" r="3" fill="#00F5FF" opacity="0.6"/>
  <circle cx="40" cy="72" r="2.5" fill="#BF00FF" opacity="0.6"/>
  <circle cx="65" cy="78" r="3" fill="#00F5FF" opacity="0.6"/>
  <line x1="35" y1="45" x2="55" y2="35" stroke="#00F5FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="55" y1="35" x2="75" y2="50" stroke="#BF00FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="45" x2="40" y2="72" stroke="#BF00FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="75" y1="50" x2="65" y2="78" stroke="#00F5FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="72" x2="65" y2="78" stroke="#00F5FF" stroke-width="0.8" opacity="0.3"/>

  <!-- N letter -->
  <text x="55" y="80" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="800" fill="url(#iconGrad)" text-anchor="middle" filter="url(#neonGlow)">N</text>

  <!-- NeuralMint text -->
  <text x="120" y="56" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#F0F0F5" letter-spacing="-1">Neural</text>
  <text x="310" y="56" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="url(#neonGrad)" letter-spacing="-1">Mint</text>

  <!-- Tagline -->
  <text x="122" y="82" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400" fill="#6B7280" letter-spacing="4" text-transform="uppercase">AI · NFT · STACKS</text>

  <!-- Accent line -->
  <line x1="120" y1="92" x2="280" y2="92" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>
