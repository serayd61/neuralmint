<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#12101F"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#BF00FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="4" y="4" width="392" height="392" rx="78" fill="none" stroke="url(#iconGrad)" stroke-width="3" opacity="0.3"/>

  <!-- Neural network nodes -->
  <circle cx="100" cy="120" r="5" fill="#00F5FF" opacity="0.2"/>
  <circle cx="300" cy="100" r="4" fill="#BF00FF" opacity="0.2"/>
  <circle cx="80" cy="280" r="4" fill="#BF00FF" opacity="0.2"/>
  <circle cx="320" cy="300" r="5" fill="#00F5FF" opacity="0.2"/>
  <line x1="100" y1="120" x2="200" y2="200" stroke="#00F5FF" stroke-width="0.8" opacity="0.1"/>
  <line x1="300" y1="100" x2="200" y2="200" stroke="#BF00FF" stroke-width="0.8" opacity="0.1"/>
  <line x1="80" y1="280" x2="200" y2="200" stroke="#BF00FF" stroke-width="0.8" opacity="0.1"/>
  <line x1="320" y1="300" x2="200" y2="200" stroke="#00F5FF" stroke-width="0.8" opacity="0.1"/>

  <!-- Inner rounded square -->
  <rect x="100" y="90" width="200" height="200" rx="48" fill="url(#iconGrad)" opacity="0.1"/>
  <rect x="100" y="90" width="200" height="200" rx="48" fill="none" stroke="url(#iconGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- N letter -->
  <text x="200" y="230" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="120" font-weight="800" fill="url(#iconGrad)" text-anchor="middle" filter="url(#glow)">N</text>

  <!-- Tagline -->
  <text x="200" y="345" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="600" fill="#6B7280" text-anchor="middle" letter-spacing="5">NEURALMINT</text>
</svg>
